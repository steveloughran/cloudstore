# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ main, master, trunk ]
  pull_request:
    branches: [ main, master, trunk ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    # SHA-pinned per SECURITY.md: third-party actions are referenced by commit
    # SHA, not by mutable tags. When bumping, update both the SHA and the
    # comment in lockstep.
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        # palantir-java-format (used by Spotless) requires JDK 11+ to format,
        # but the compiled bytecode is still pinned to source/target=1.8.
        java-version: '11'
        distribution: 'temurin'
    - name: Verify (compile + tests + RAT + Spotless)
      run: mvn -B verify
    - name: Build site
      run: mvn -B site -DskipTests
