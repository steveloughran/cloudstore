# Dependency Review: fails the PR if it introduces a new vulnerable
# transitive dependency or a disallowed license. Surfaces a PR comment
# summarizing new dependencies.
#
# Hadoop / AWS SDK / GCS-connector pins are manually chosen to work around
# known CVEs in the broader Hadoop ecosystem (see dependabot.yml). The
# action's failure threshold below ('high') matches that pragmatic stance
# without rubber-stamping new highs that were added in *this* PR.
#
# Third-party actions are SHA-pinned per SECURITY.md.

name: Dependency review

on:
  pull_request:
    branches: [ main, master, trunk ]

permissions:
  contents: read
  # Required so the action can post the summary comment.
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Dependency review
      uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
      with:
        fail-on-severity: high
        comment-summary-in-pr: on-failure