# The format of this file is documented at
# https://github.com/apache/infrastructure-asfyaml/blob/main/README.md

github:
  description: "Apache Hadoop Cloudstore Tool"
  homepage: https://hadoop.apache.org/
  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: true
    # default commit message when merging with a squash commit
    # can either be: DEFAULT | PR_TITLE | PR_TITLE_AND_COMMIT_DETAILS | PR_TITLE_AND_DESC
    squash_commit_message: PR_TITLE_AND_COMMIT_DETAILS
  autolink_jira:
    - HADOOP
  # Projects can enable and disable Dependabot alerts and automatic security update pull requests:
  # this is on experimentally, we don't want to update hadoop because we want
  # to pin versions down
  dependabot_alerts:  true
  dependabot_updates: true
  copilot_code_review:
      enabled: true
      review_drafts: false
      review_on_push: true

  pull_requests:
    # auto-delete head branches after being merged
    del_branch_on_merge: true
  # see https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-protected-branches/about-protected-branches
  protected_branches:
    # main is locked down
    main:
      required_status_checks:
        # strict means "Require branches to be up to date before merging".
        strict: false
        # contexts are the names of checks that must pass.
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_last_push_approval: false
        # commit then review OK for now
        required_approving_review_count: 0

      # squash or rebase must be allowed in the repo for this setting to be set to true.
      required_linear_history: true

      # gh merge signs; manual commits need committers to set up git commit signing.
      required_signatures: true

      # requires all conversations to be resolved before merging is possible
      required_conversation_resolution: false

notifications:
  commits:      common-commits@hadoop.apache.org
  issues:       common-issues@hadoop.apache.org
  pullrequests: common-issues@hadoop.apache.org
  jira_options: comment link label

features:
  wiki: false
  issues: false
  projects: false



